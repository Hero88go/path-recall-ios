<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PATH RECALL — Memory Path Game</title>
<meta name="description" content="A glowing path traces across the grid. Retrace it from memory. Each level adds a step.">
<meta name="theme-color" content="#08090f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,200;9..144,300&family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#08090f; --bg2:#0d0f18; --cell:#13161f; --cell-hover:#1a1e2a;
  --text:#e0e8f0; --text-dim:#6a7585; --text-muted:#3a4250;
  --violet:#a060ff; --violet-bright:#c08fff; --violet-glow:rgba(160,96,255,0.5);
  --mint:#5fd4a0; --red:#d45f5f;
}
html, body {
  width:100%; height:100%; overflow:hidden;
  background:var(--bg); color:var(--text);
  font-family:'Hanken Grotesk',-apple-system,sans-serif;
  -webkit-user-select:none; user-select:none;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
  display:flex; flex-direction:column;
}
.app {
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:env(safe-area-inset-top) 18px env(safe-area-inset-bottom);
}

.hud {
  display:flex; justify-content:space-between; width:100%; max-width:480px;
  padding:0 6px; margin-bottom:24px;
}
.hud-block { display:flex; flex-direction:column; gap:2px; }
.hud-label { font-size:9px; letter-spacing:0.22em; color:var(--text-muted); text-transform:uppercase; }
.hud-val { font-family:'Fraunces',serif; font-size:30px; font-weight:300; color:var(--text); line-height:1; }
.hud-val.accent { color:var(--violet-bright); }

.grid {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  width:min(92vw, 460px);
  aspect-ratio:1;
  margin-bottom:24px;
}
.cell {
  background:var(--cell);
  border-radius:14px;
  position:relative;
  cursor:pointer;
  transition:background 0.15s, transform 0.1s;
}
.cell:active { transform:scale(0.94); }
.cell.show { background:var(--violet); box-shadow:0 0 28px var(--violet-glow), inset 0 0 16px rgba(255,255,255,0.2); }
.cell.user { background:var(--mint); box-shadow:0 0 20px rgba(95,212,160,0.4); }
.cell.wrong { background:var(--red); animation:shake 0.3s; }
@keyframes shake {
  0%,100% { transform:translateX(0); }
  25% { transform:translateX(-4px); }
  75% { transform:translateX(4px); }
}

.status {
  font-family:'JetBrains Mono',monospace; font-size:13px;
  letter-spacing:0.16em; color:var(--text-dim); text-transform:uppercase;
  height:20px;
  text-align:center;
}
.status.go { color:var(--mint); }
.status.watch { color:var(--violet-bright); }

.cta {
  position:absolute; bottom:calc(env(safe-area-inset-bottom) + 28px); left:50%; transform:translateX(-50%);
  font-family:'Hanken Grotesk',sans-serif; font-size:13px; font-weight:600;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--bg); background:var(--violet);
  border:none; padding:18px 56px; border-radius:999px;
  cursor:pointer; transition:transform 0.15s;
  box-shadow:0 0 32px var(--violet-glow);
  display:none;
}
.cta:active { transform:translateX(-50%) scale(0.97); }
.cta.show { display:block; }

#intro, #gameOver {
  position:fixed; inset:0; z-index:5;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  padding:24px;
  background:radial-gradient(ellipse at center, rgba(8,9,15,0.85), rgba(8,9,15,0.98));
}
#intro.active, #gameOver.active { display:flex; }

.eyebrow { font-size:11px; font-weight:500; letter-spacing:0.28em; color:var(--violet-bright); text-transform:uppercase; margin-bottom:14px; }
.title {
  font-family:'Fraunces',serif; font-size:clamp(54px,14vw,108px);
  font-weight:200; letter-spacing:0.06em; line-height:0.95;
  background:linear-gradient(180deg,var(--text) 30%,var(--text-dim) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:16px;
}
.sub { font-size:15px; color:var(--text-dim); max-width:340px; text-align:center; line-height:1.5; margin-bottom:40px; }
.cta-static {
  font-family:'Hanken Grotesk',sans-serif; font-size:13px; font-weight:600;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--bg); background:var(--violet);
  border:none; padding:18px 56px; border-radius:999px;
  cursor:pointer; transition:transform 0.15s;
  box-shadow:0 0 32px var(--violet-glow);
}
.cta-static:active { transform:scale(0.97); }
.score-stat { display:flex; flex-direction:column; align-items:center; margin-bottom:30px; }
.score-val { font-family:'Fraunces',serif; font-size:96px; font-weight:200; color:var(--violet-bright); line-height:1; }
.score-label { font-size:11px; letter-spacing:0.22em; color:var(--text-muted); text-transform:uppercase; margin-top:6px; }
.best-line { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-dim); margin-bottom:36px; }
</style>
</head>
<body>

<div class="app">
  <div class="hud">
    <div class="hud-block">
      <div class="hud-label">Level</div>
      <div class="hud-val" id="hudLevel">1</div>
    </div>
    <div class="hud-block" style="text-align:right; align-items:flex-end;">
      <div class="hud-label">Path</div>
      <div class="hud-val accent" id="hudPath">3</div>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="status" id="status">Watch the path</div>
</div>

<div id="intro" class="active">
  <div class="eyebrow">Path Recall</div>
  <h1 class="title">TRACE</h1>
  <p class="sub">A glowing path lights up cell by cell. Retrace it from memory. Each level adds a step.</p>
  <button class="cta-static" id="introBtn">Start</button>
</div>

<div id="gameOver">
  <div class="eyebrow">Path lost</div>
  <div class="score-stat">
    <div class="score-val" id="finalLevel">1</div>
    <div class="score-label">Levels cleared</div>
  </div>
  <div class="best-line">Best: <span id="bestLevel">1</span> · Path length: <span id="finalPath">3</span></div>
  <button class="cta-static" id="restartBtn">Try Again</button>
</div>

<script>
const GRID_SIZE = 5;
const STATE = {
  level:1,
  path:[],
  userIdx:0,
  showing:false,
  best:Number(localStorage.getItem('pathrecall_best') || 0),
};

const grid = document.getElementById('grid');
const cells = [];
for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.dataset.idx = i;
  cell.addEventListener('click', () => onCellTap(i));
  cell.addEventListener('touchstart', (e) => { e.preventDefault(); onCellTap(i); }, { passive:false });
  grid.appendChild(cell);
  cells.push(cell);
}

function adjacentCells(idx){
  const r = Math.floor(idx / GRID_SIZE), c = idx % GRID_SIZE;
  const out = [];
  for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
    const nr = r+dr, nc = c+dc;
    if (nr>=0 && nr<GRID_SIZE && nc>=0 && nc<GRID_SIZE) out.push(nr*GRID_SIZE+nc);
  }
  return out;
}

function generatePath(len){
  const path = [Math.floor(Math.random() * GRID_SIZE * GRID_SIZE)];
  while (path.length < len) {
    const next = adjacentCells(path[path.length-1]).filter(i => !path.includes(i));
    if (next.length === 0) break;
    path.push(next[Math.floor(Math.random() * next.length)]);
  }
  return path;
}

function clearAllCells(){ cells.forEach(c => c.className = 'cell'); }

async function showPath(){
  STATE.showing = true;
  document.getElementById('status').textContent = 'Watch';
  document.getElementById('status').className = 'status watch';
  clearAllCells();
  await sleep(400);
  for (let i = 0; i < STATE.path.length; i++) {
    cells[STATE.path[i]].classList.add('show');
    await sleep(420);
    cells[STATE.path[i]].classList.remove('show');
    await sleep(120);
  }
  STATE.showing = false;
  STATE.userIdx = 0;
  document.getElementById('status').textContent = 'Your turn';
  document.getElementById('status').className = 'status go';
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

function onCellTap(idx){
  if (STATE.showing) return;
  const expected = STATE.path[STATE.userIdx];
  if (idx === expected) {
    cells[idx].classList.add('user');
    STATE.userIdx++;
    if (navigator.vibrate) navigator.vibrate(8);
    setTimeout(() => cells[idx].classList.remove('user'), 200);
    if (STATE.userIdx >= STATE.path.length) {
      // level complete
      document.getElementById('status').textContent = 'Cleared';
      setTimeout(nextLevel, 600);
    }
  } else {
    cells[idx].classList.add('wrong');
    if (navigator.vibrate) navigator.vibrate([60,40,60]);
    setTimeout(gameOver, 700);
  }
}

function nextLevel(){
  STATE.level++;
  startLevel();
}

function startLevel(){
  document.getElementById('hudLevel').textContent = STATE.level;
  const pathLen = 2 + STATE.level;
  document.getElementById('hudPath').textContent = pathLen;
  STATE.path = generatePath(pathLen);
  if (STATE.path.length < pathLen) { // generation failed (shouldn't), regen
    STATE.path = generatePath(pathLen);
  }
  showPath();
}

function gameOver(){
  window.dispatchEvent(new Event('gameOver'));
  const cleared = STATE.level - 1;
  document.getElementById('finalLevel').textContent = cleared;
  document.getElementById('finalPath').textContent = STATE.path.length;
  if (cleared > STATE.best) {
    STATE.best = cleared;
    localStorage.setItem('pathrecall_best', String(cleared));
  }
  document.getElementById('bestLevel').textContent = STATE.best;
  document.getElementById('gameOver').classList.add('active');
}

function startGame(){
  STATE.level = 1;
  document.getElementById('intro').classList.remove('active');
  document.getElementById('gameOver').classList.remove('active');
  startLevel();
}

document.getElementById('introBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
</script>
<script>
/* ═══════════════ ADMOB: banner + interstitial + layout reserve ═══════════════
   Real ads when REAL_IDS are filled, falls back to Google test IDs otherwise.
   Sets --ad-banner-height CSS variable so layout containers shrink to make room.
   Interstitial fires every Nth gameOver event. */
(() => {
  // CSS that reserves bottom space for the banner
  const css = document.createElement('style');
  css.textContent = `
    :root { --ad-banner-height: 0px; }
    .screen, #app, .app, #intro, #result, #gameOver,
    #title-screen, #game-screen, #result-screen,
    #screen-title, #screen-game, #screen-result, #screen-settings {
      bottom: var(--ad-banner-height, 0px) !important;
      transition: bottom 0.2s ease;
    }
    canvas#fx, canvas#canvas, canvas#inkCanvas, canvas#particles,
    canvas#particle-canvas, canvas#lightning-canvas {
      bottom: var(--ad-banner-height, 0px) !important;
      height: calc(100% - var(--ad-banner-height, 0px)) !important;
    }
    body { padding-bottom: var(--ad-banner-height, 0px); box-sizing: border-box; transition: padding-bottom 0.2s ease; }
  `;
  document.head.appendChild(css);

  const isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
  const AdMob = isNative ? (window.Capacitor.Plugins && window.Capacitor.Plugins.AdMob) : null;

  const TEST_IDS = {
    banner:       'ca-app-pub-3940256099942544/2934735716',
    interstitial: 'ca-app-pub-3940256099942544/4411468910',
  };
  const REAL_IDS = {
    banner:       'ca-app-pub-3785960678886818/2920935121',
    interstitial: 'ca-app-pub-3785960678886818/4313907848',
  };
  const BANNER_AD_ID       = REAL_IDS.banner       || TEST_IDS.banner;
  const INTERSTITIAL_AD_ID = REAL_IDS.interstitial || TEST_IDS.interstitial;
  const INTERSTITIAL_EVERY = 3;

  let interstitialReady = false;

  const setH = (px) => document.documentElement.style.setProperty('--ad-banner-height', px + 'px');

  async function showBanner() {
    if (!AdMob) return;
    try {
      setH(0); // no reserve until banner actually loads
      await AdMob.showBanner({
        adId: BANNER_AD_ID,
        adSize: 'ADAPTIVE_BANNER',
        position: 'BOTTOM_CENTER',
        margin: 0,
      });
    } catch (e) { setH(0); console.error('AdMob showBanner:', e); }
  }

  async function prepareInterstitial() {
    if (!AdMob) return;
    try {
      await AdMob.prepareInterstitial({ adId: INTERSTITIAL_AD_ID });
      interstitialReady = true;
    } catch (e) { interstitialReady = false; }
  }

  async function showInterstitial() {
    if (!AdMob) return false;
    if (!interstitialReady) { prepareInterstitial(); return false; }
    try {
      await AdMob.showInterstitial();
      interstitialReady = false;
      prepareInterstitial();
      return true;
    } catch (e) {
      interstitialReady = false; prepareInterstitial();
      return false;
    }
  }

  window.addEventListener('gameOver', () => {
    const next = (parseInt(localStorage.getItem('_ad_go_count')) || 0) + 1;
    localStorage.setItem('_ad_go_count', String(next));
    if (next % INTERSTITIAL_EVERY === 0) showInterstitial();
  });

  async function init() {
    if (!AdMob) return;
    try {
      try {
        if (typeof AdMob.requestTrackingAuthorization === 'function') {
          await AdMob.requestTrackingAuthorization();
        }
      } catch (e) { console.warn('AdMob ATT:', e); }

      await AdMob.initialize({ initializeForTesting: false });

      try {
        const info = await AdMob.requestConsentInfo();
        if (info && info.status === 'REQUIRED' && info.isConsentFormAvailable) {
          await AdMob.showConsentForm();
        }
      } catch (e) { console.warn('AdMob UMP skipped:', e); }

      // Reserve layout space only when banner actually renders.
      try {
        AdMob.addListener('bannerAdLoaded', () => setH(60));
        AdMob.addListener('bannerAdFailedToLoad', () => setH(0));
        AdMob.addListener('bannerAdSizeChanged', (size) => {
          if (size && size.height) setH(size.height);
        });
      } catch (e) { console.warn('AdMob banner listeners:', e); }

      showBanner();
      prepareInterstitial();
    } catch (e) { console.error('AdMob init:', e); }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
